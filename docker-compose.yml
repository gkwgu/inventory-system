services:
  postgres:
    image: postgres:16
    container_name: inventorySystem-postgres
    restart: always
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: inventorySystem_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql

volumes:
  postgres_data:
