spring:
  datasource:
    url: jdbc:postgresql://localhost:5433/inventorySystem_db
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    defer-datasource-initialization: true
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB

  flyway:
    enabled: true
    locations: classpath:db/migration

import:
  excel:
    max-rows: 100
    sheet-index: 0
    enabled: true
    file-path: Прайс Электроника.xls